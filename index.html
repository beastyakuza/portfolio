<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Sergio Fernandez</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="portfolioContent">
        <section class="profileSection">
            <article class="profileHeader">
            <div class="profileImageContainer">
                <img class="profileImage" src="" alt="Foto de perfil de Sergio Ivan Fernandez Galeano">
            </div>
            <div class="profileInfo">
            <h1 class="profileName">SERGIO IVAN FERNANDEZ GALEANO</h1>

            </div>
            </article>
            <address class="contactSection">
                <h2 class="sectionTitle">Contacto</h2>
                <ul class="contactList">
                    <li class="contactItem">+57 3117654431</li>
                    <li class="contactItem">sercolgi1@gmail.com</li>
                    <li class="contactItem">Bogota, Colombia</li>
                </ul>
            </address>
            <article class="skillsSection">
                <h2 class="sectionTitle">Habilidades</h2>
                <ul class="skillsList">

                    <li class="skillItem">CSS</li>
                    <li class="skillItem">JAVASCRIPT</li>

                <h2 class="sectionTitle">Idiomas</h2>
                <ul class="languagesList">
                    <li class="languageItem">
                        <span class="languageName">español</span>
                        <span class="languageLevel">nativo</span>

                    <li class="languageItem">
                        <span class="languageName">ingles</span>

        <section class="additionalInfoSection">
